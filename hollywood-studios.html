<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hollywood Studios Wait Times</title>
  <link rel="stylesheet" href="shared.css">
</head>
<body>
  <div class="park-switcher">
    <h1 id="parkHeading" onclick="toggleMenu()">🎬 Hollywood Studios <span class="caret">▾</span></h1>
    <div class="park-menu" id="parkMenu">
      <a href="magic-kingdom.html">🏰 Magic Kingdom</a>
      <a href="epcot.html">🌎 Epcot</a>
      <a class="current" href="hollywood-studios.html">🎬 Hollywood Studios</a>
      <a href="animal-kingdom.html">🌿 Animal Kingdom</a>
    </div>
  </div>

  <div class="view-toggle">
    <button class="view-btn active" data-view="rides">🎢 Rides</button>
    <button class="view-btn" data-view="shows">🎭 Shows</button>
    <button class="view-btn" data-view="characters">🌟 Characters</button>
    <button class="view-btn" data-view="dining">🍽️ Dining</button>
  </div>
  <select id="viewSelect" class="view-select">
    <option value="rides">🎢 Rides</option>
    <option value="shows">🎭 Shows</option>
    <option value="characters">🌟 Characters</option>
    <option value="dining">🍽️ Dining</option>
  </select>

  <div class="filters">
    <input id="search" type="text" placeholder="Search...">
    <select id="waitFilter">
      <option value="0">Any wait</option>
      <option value="15">≤ 15 min</option>
      <option value="30">≤ 30 min</option>
      <option value="45">≤ 45 min</option>
      <option value="60">≤ 60 min</option>
    </select>
  </div>

  <div class="count-row">
    <div id="count"></div>
    <div id="updated">Loading...</div>
  </div>

  <div class="table-wrap" id="ridesWrap">
    <table id="ridesTable">
      <thead>
        <tr>
          <th data-col="name">Name <span class="arrow"></span></th>
          <th data-col="wait" class="active">Wait <span class="arrow">▲</span></th>
          <th data-col="ll">Next LL <span class="arrow"></span></th>
        </tr>
      </thead>
      <tbody id="ridesTbody"></tbody>
    </table>
  </div>

  <div class="table-wrap hidden" id="charactersWrap">
    <table id="charactersTable">
      <thead>
        <tr>
          <th data-col="name">Name <span class="arrow"></span></th>
          <th data-col="wait" class="active">Wait <span class="arrow">▲</span></th>
        </tr>
      </thead>
      <tbody id="charactersTbody"></tbody>
    </table>
  </div>

  <div class="table-wrap hidden" id="diningWrap">
    <table id="diningTable">
      <thead>
        <tr>
          <th data-col="name">Name <span class="arrow"></span></th>
          <th data-col="wait" class="active">Wait <span class="arrow">▲</span></th>
        </tr>
      </thead>
      <tbody id="diningTbody"></tbody>
    </table>
  </div>

  <div class="table-wrap hidden" id="showsWrap">
    <table id="showsTable">
      <thead>
        <tr>
          <th data-col="name">Name <span class="arrow"></span></th>
          <th data-col="next" class="active">Next Showtimes <span class="arrow">▲</span></th>
        </tr>
      </thead>
      <tbody id="showsTbody"></tbody>
    </table>
  </div>

  <script>
    const API_URL = 'https://api.themeparks.wiki/v1/entity/288747d1-8b4f-4a64-867e-ea7c9b27bad8/live';
    const HEIGHT_REQS = {
      'Alien Swirling Saucers': 32,
      'Millennium Falcon: Smugglers Run': 38,
      'Slinky Dog Dash': 38,
      'Star Tours – The Adventures Continue': 40,
      'Star Wars: Rise of the Resistance': 40,
      'The Twilight Zone™ Tower of Terror': 40,
      "Rock 'n' Roller Coaster Starring The Muppets": 48,
    };
    const LOCATIONS = {
      "Millennium Falcon: Smugglers Run": { lat: 28.353889, lng: -81.561689 },
      "Rock 'n' Roller Coaster Starring The Muppets": { lat: 28.359712, lng: -81.56059 },
      "The Twilight Zone™ Tower of Terror": { lat: 28.359553, lng: -81.559772 },
      "Walt Disney Presents": { lat: 28.35686, lng: -81.560982 },
      "Alien Swirling Saucers": { lat: 28.355385, lng: -81.562379 },
      "Slinky Dog Dash": { lat: 28.356245, lng: -81.562786 },
      "Vacation Fun - An Original Animated Short with Mickey & Minnie": { lat: 28.356316, lng: -81.559031 },
      "Mickey & Minnie's Runaway Railway": { lat: 28.3566783801, lng: -81.5605667783 },
      "Star Wars: Rise of the Resistance": { lat: 28.354884, lng: -81.560457 },
      "Toy Story Mania!": { lat: 28.356404, lng: -81.561894 },
      "Star Tours – The Adventures Continue": { lat: 28.355695, lng: -81.558891 },
    };
  </script>
  <script src="shared.js"></script>
</body>
</html>

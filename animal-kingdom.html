<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animal Kingdom Wait Times</title>
  <link rel="stylesheet" href="shared.css">
</head>
<body>
  <div class="park-switcher">
    <h1 id="parkHeading" onclick="toggleMenu()">🌿 Animal Kingdom <span class="caret">▾</span></h1>
    <div class="park-menu" id="parkMenu">
      <a href="magic-kingdom.html">🏰 Magic Kingdom</a>
      <a href="epcot.html">🌎 Epcot</a>
      <a href="hollywood-studios.html">🎬 Hollywood Studios</a>
      <a class="current" href="animal-kingdom.html">🌿 Animal Kingdom</a>
    </div>
  </div>

  <div class="view-toggle">
    <button class="view-btn active" data-view="rides">🎢 Rides</button>
    <button class="view-btn" data-view="shows">🎭 Shows</button>
    <button class="view-btn" data-view="characters">🌟 Characters</button>
    <button class="view-btn" data-view="dining">🍽️ Dining</button>
  </div>
  <select id="viewSelect" class="view-select">
    <option value="rides">🎢 Rides</option>
    <option value="shows">🎭 Shows</option>
    <option value="characters">🌟 Characters</option>
    <option value="dining">🍽️ Dining</option>
  </select>

  <div class="filters">
    <input id="search" type="text" placeholder="Search...">
    <select id="waitFilter">
      <option value="0">Any wait</option>
      <option value="15">≤ 15 min</option>
      <option value="30">≤ 30 min</option>
      <option value="45">≤ 45 min</option>
      <option value="60">≤ 60 min</option>
    </select>
  </div>

  <div class="count-row">
    <div id="count"></div>
    <div id="updated">Loading...</div>
  </div>

  <div class="table-wrap" id="ridesWrap">
    <table id="ridesTable">
      <thead>
        <tr>
          <th data-col="name">Name <span class="arrow"></span></th>
          <th data-col="wait" class="active">Wait <span class="arrow">▲</span></th>
          <th data-col="ll">Next LL <span class="arrow"></span></th>
        </tr>
      </thead>
      <tbody id="ridesTbody"></tbody>
    </table>
  </div>

  <div class="table-wrap hidden" id="charactersWrap">
    <table id="charactersTable">
      <thead>
        <tr>
          <th data-col="name">Name <span class="arrow"></span></th>
          <th data-col="wait" class="active">Wait <span class="arrow">▲</span></th>
        </tr>
      </thead>
      <tbody id="charactersTbody"></tbody>
    </table>
  </div>

  <div class="table-wrap hidden" id="diningWrap">
    <table id="diningTable">
      <thead>
        <tr>
          <th data-col="name">Name <span class="arrow"></span></th>
          <th data-col="wait" class="active">Wait <span class="arrow">▲</span></th>
        </tr>
      </thead>
      <tbody id="diningTbody"></tbody>
    </table>
  </div>

  <div class="table-wrap hidden" id="showsWrap">
    <table id="showsTable">
      <thead>
        <tr>
          <th data-col="name">Name <span class="arrow"></span></th>
          <th data-col="next" class="active">Next Showtimes <span class="arrow">▲</span></th>
        </tr>
      </thead>
      <tbody id="showsTbody"></tbody>
    </table>
  </div>
